name: LGTM Gate

on:
  pull_request_target:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  require-lgtm:
    name: Require LGTM Comment
    if: github.event_name == 'pull_request_target' || github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Update LGTM status
        uses: actions/github-script@v7
        with:
          script: |
            const approver = 'l-1cm-l';
            const statusContext = 'LGTM Comment';

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request
              ?? (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: context.payload.issue.number
              })).data;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });

            const headCommit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: pr.head.sha
            });
            const headCommitTime = new Date(headCommit.data.commit.committer.date);

            const lgtmComments = comments.filter(comment =>
              comment.user?.login === approver &&
              comment.body.trim().toUpperCase() === 'LGTM'
            );
            const hasLgtm = lgtmComments.some(comment =>
              new Date(comment.updated_at) >= headCommitTime
            );

            core.info(`PR #${pr.number} head sha: ${pr.head.sha}`);
            core.info(`Head commit time: ${headCommitTime.toISOString()}`);
            core.info(`LGTM comments from ${approver}: ${lgtmComments.length}`);
            for (const comment of lgtmComments) {
              core.info(`LGTM comment ${comment.id} updated at ${comment.updated_at}`);
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: pr.head.sha,
              context: statusContext,
              state: hasLgtm ? 'success' : 'failure',
              description: hasLgtm
                ? `${approver} approved this commit with LGTM`
                : `Waiting for ${approver} to comment LGTM after the latest commit`
            });

            if (!hasLgtm) {
              core.setFailed(`Waiting for ${approver} to comment LGTM after the latest commit.`);
            }
