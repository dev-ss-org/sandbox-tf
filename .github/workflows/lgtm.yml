name: LGTM Gate

on:
  issue_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  require-lgtm:
    name: Require LGTM Comment
    if: github.event_name == 'pull_request_review' || github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request != null
    runs-on: ubuntu-slim

    steps:
      - name: Update LGTM status
        uses: actions/github-script@v9
        with:
          script: |
            const approver = 'l-1cm-l';
            const statusContext = 'LGTM Comment';

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request
              ?? (await github.rest.pulls.get({
                owner,
                repo,
                pull_number: context.payload.issue.number
              })).data;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const isApprover = item =>
              item.user?.login?.toLowerCase() === approver.toLowerCase();
            const hasLgtmText = body => /\bLGTM\b/i.test(body ?? '');

            const lgtmComments = comments.filter(comment =>
              isApprover(comment) && hasLgtmText(comment.body)
            );
            const lgtmReviews = reviews.filter(review =>
              isApprover(review) && hasLgtmText(review.body)
            );
            const lgtmReviewComments = reviewComments.filter(comment =>
              isApprover(comment) && hasLgtmText(comment.body)
            );
            const hasLgtm = lgtmComments.length > 0 ||
              lgtmReviews.length > 0 ||
              lgtmReviewComments.length > 0;

            core.info(`PR #${pr.number} head sha: ${pr.head.sha}`);
            core.info(`Issue comments from ${approver} with LGTM: ${lgtmComments.length}`);
            core.info(`Pull request reviews from ${approver} with LGTM: ${lgtmReviews.length}`);
            core.info(`Pull request review comments from ${approver} with LGTM: ${lgtmReviewComments.length}`);
            for (const comment of lgtmComments) {
              core.info(`LGTM comment ${comment.id} updated at ${comment.updated_at}`);
            }
            for (const review of lgtmReviews) {
              core.info(`LGTM review ${review.id} submitted at ${review.submitted_at}`);
            }
            for (const comment of lgtmReviewComments) {
              core.info(`LGTM review comment ${comment.id} updated at ${comment.updated_at}`);
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: pr.head.sha,
              context: statusContext,
              state: hasLgtm ? 'success' : 'failure',
              description: hasLgtm
                ? `${approver} approved with LGTM`
                : `Waiting for ${approver} to comment LGTM`
            });

            if (!hasLgtm) {
              core.setFailed(`Waiting for ${approver} to comment LGTM.`);
            }
