name: Terraform CI/CD

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: 1.15.1
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  lint:
    name: Terraform Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: TFLint init
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: TFLint
        run: |
          ls -la .tflint.hcl
          tflint --version
          echo "Running TFLint..."
          tflint --recursive --format compact

  plan:
    name: Terraform Plan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: lint
    if: github.event_name == 'pull_request' && github.actor == 'l-1cm-l'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials for plan
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::169049008132:role/GitHubActionsTerraformPlanRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -out=tfplan > plan.txt
          exit_code=$?
          cat plan.txt
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit ${exit_code}

      - name: Comment Terraform plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const plan = fs.readFileSync('plan.txt', 'utf8');
            const maxLength = 60000;

            const truncatedPlan = plan.length > maxLength
              ? plan.substring(0, maxLength) + "\n\n... plan output was truncated ..."
              : plan;

            const body = `## Terraform Plan Result

            **Repository:** \`${{ github.repository }}\`  
            **Branch:** \`${{ github.head_ref }}\`  
            **Workflow:** \`${{ github.workflow }}\`  
            **Commit:** \`${{ github.sha }}\`

            <details>
            <summary>Show terraform plan</summary>

            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`

            </details>
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const marker = '## Terraform Plan Result';
            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

  apply:
    name: Terraform Apply
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: lint
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write

    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials for apply
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::169049008132:role/GitHubActionsTerraformApplyRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan for apply
        id: apply_plan
        run: |
          set +e
          terraform plan -no-color -out=tfplan > /dev/null
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit ${exit_code}

      - name: Terraform apply
        id: apply
        run: |
          set +e
          terraform apply -auto-approve -no-color tfplan > apply.txt
          exit_code=$?
          cat apply.txt
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit ${exit_code}

      - name: Comment Terraform apply result on merged PR
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const { owner, repo } = context.repo;
            const sha = context.sha;

            const associatedPulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha
            });

            let pull = associatedPulls.data[0];

            if (!pull) {
              const message = context.payload.head_commit?.message ?? '';
              const match = message.match(/Merge pull request #(\d+)/);
              if (match) {
                pull = (await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: Number(match[1])
                })).data;
              }
            }

            if (!pull) {
              core.info(`No merged pull request found for ${sha}; skipping apply comment.`);
              return;
            }

            const readFile = path => fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '';
            const truncate = text => {
              const maxLength = 50000;
              return text.length > maxLength
                ? text.substring(0, maxLength) + "\n\n... output was truncated ..."
                : text;
            };

            const planExitCode = '${{ steps.apply_plan.outputs.exit_code }}';
            const applyExitCode = '${{ steps.apply.outputs.exit_code }}';
            const applyOutput = truncate(readFile('apply.txt'));

            const success = planExitCode === '0' && applyExitCode === '0';
            const applySummary = applyOutput || 'Terraform apply did not run.';

            const body = `## Terraform Apply Result

            - **Repository:** \`${{ github.repository }}\`
            - **Workflow:** \`${{ github.workflow }}\`
            - **Commit:** \`${{ github.sha }}\`
            - **Result:** ${success ? 'Succeeded' : 'Failed'}
            - **Plan exit code:** \`${planExitCode || 'not available'}\`
            - **Apply exit code:** \`${applyExitCode || 'not available'}\`

            <details>
            <summary>Show terraform apply</summary>

            \`\`\`terraform
            ${applySummary}
            \`\`\`

            </details>
            `;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull.number,
              body
            });
