name: Terraform CI/CD

on:
  pull_request:
    branches:
      - master
    paths:
      - "**.tf"
      - ".github/workflows/terraform.yml"

  push:
    branches:
      - master
    paths:
      - "**.tf"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  TF_VERSION: 1.10.0
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for plan
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::169049008132:role/GitHubActionsTerraformPlanRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials for apply
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::169049008132:role/GitHubActionsTerraformApplyRole
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsTerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan for apply
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve -no-color tfplan
